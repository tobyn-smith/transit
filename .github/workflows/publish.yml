on:
  push:
    branches: [main]
  workflow_dispatch:

name: Render and Publish

# Renders the Quarto site and deploys it to GitHub Pages via the Actions
# artifact (Pages source must be set to "GitHub Actions"). The analysis runs at
# render time from committed data plus Natural Earth geometry, no downloads.

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: quarto-dev/quarto-actions/setup@v2

      - uses: r-lib/actions/setup-r@v2
        with:
          use-public-rspm: true

      # Installs the packages and their system requirements (GDAL/GEOS/PROJ for
      # sf). Swap to renv once a renv.lock is committed.
      - uses: r-lib/actions/setup-r-dependencies@v2
        with:
          packages: |
            any::rmarkdown
            any::knitr
            any::sf
            any::dplyr
            any::readr
            any::ggplot2
            any::leaflet
            any::rnaturalearth
            any::rnaturalearthdata
            any::scales
            any::gt

      - name: Render
        run: quarto render

      - uses: actions/upload-pages-artifact@v3
        with:
          path: docs

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url || steps.deployment-retry.outputs.page_url }}
    steps:
      # GitHub Pages sometimes returns a transient "Deployment failed, try again
      # later". Do not fail the run on the first attempt.
      - id: deployment
        uses: actions/deploy-pages@v4
        continue-on-error: true

      # If the first attempt failed, wait briefly and try once more.
      - if: steps.deployment.outcome == 'failure'
        run: sleep 15
      - id: deployment-retry
        if: steps.deployment.outcome == 'failure'
        uses: actions/deploy-pages@v4
